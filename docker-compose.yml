version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: artesanias_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     artesanias_user
      POSTGRES_PASSWORD: artesanias_pass
      POSTGRES_DB:       artesanias_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artesanias_user -d artesanias_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: artesanias_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: artesanias-backend:latest
    container_name: artesanias_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://artesanias_user:artesanias_pass@postgres:5432/artesanias_db
      REDIS_URL:    redis://redis:6379
      NODE_ENV:     production
    ports:
      - "0.0.0.0:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: artesanias-frontend:latest
    container_name: artesanias_frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: artesanias-network
