name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/artesanias_test
  JWT_SECRET: test-secret-key-for-ci-at-least-32-characters
  JWT_REFRESH_SECRET: test-refresh-secret-for-ci-at-least-32-characters
  REDIS_URL: redis://localhost:6379

jobs:
  # ─────────────────────────────────────────────────────────────
  # LINT & TYPE CHECK
  # ─────────────────────────────────────────────────────────────
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend lint
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend linter
        working-directory: backend
        run: npm run lint

      - name: Run backend type check
        working-directory: backend
        run: npx tsc --noEmit

      # Frontend lint
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend linter
        working-directory: frontend
        run: npm run lint

      - name: Run frontend type check
        working-directory: frontend
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────
  # BACKEND TESTS (Unit + Integration)
  # ─────────────────────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    needs: lint-and-types

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artesanias_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run database migrations
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run backend unit tests
        working-directory: backend
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=3001
          API_PREFIX=/api/v1
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_SECRET=${{ env.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN=7d
          REDIS_URL=${{ env.REDIS_URL }}
          REDIS_PREFIX=artesanias:
          RATE_LIMIT_WINDOW_MS=900000
          RATE_LIMIT_MAX=100
          CORS_ORIGINS=http://localhost:5173
          BCRYPT_ROUNDS=12
          LOG_LEVEL=info
          EOF
          npm run test:unit

      - name: Run backend integration tests
        working-directory: backend
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=3001
          API_PREFIX=/api/v1
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_SECRET=${{ env.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN=7d
          REDIS_URL=${{ env.REDIS_URL }}
          REDIS_PREFIX=artesanias:
          RATE_LIMIT_WINDOW_MS=900000
          RATE_LIMIT_MAX=100
          CORS_ORIGINS=http://localhost:5173
          BCRYPT_ROUNDS=12
          LOG_LEVEL=info
          EOF
          npm run test:int

  # ─────────────────────────────────────────────────────────────
  # FRONTEND BUILD
  # ─────────────────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    needs: lint-and-types

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001/api/v1

  # ─────────────────────────────────────────────────────────────
  # PLAYWRIGHT E2E TESTS
  # ─────────────────────────────────────────────────────────────
  playwright-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artesanias_test
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run database migrations
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed database
        working-directory: backend
        run: npx prisma db seed || true
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      # Create .env.test for backend (with x-test-mode for rate limiter)
      - name: Create backend env file
        working-directory: backend
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=3001
          API_PREFIX=/api/v1
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_SECRET=${{ env.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN=7d
          REDIS_URL=${{ env.REDIS_URL }}
          REDIS_PREFIX=artesanias:
          RATE_LIMIT_WINDOW_MS=900000
          RATE_LIMIT_MAX=100
          CORS_ORIGINS=http://localhost:5173
          BCRYPT_ROUNDS=12
          LOG_LEVEL=info
          EOF

      # Start backend server
      - name: Start backend server
        working-directory: backend
        run: npm run dev &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          REDIS_URL: ${{ env.REDIS_URL }}
          NODE_ENV: development
          PORT: 3001

      # Start frontend dev server
      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev &
        env:
          VITE_API_URL: http://localhost:3001/api/v1

      # Wait for servers
      - name: Wait for backend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3001/api/v1/health > /dev/null 2>&1 || curl -s http://localhost:3001/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 2
          done

      - name: Wait for frontend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 2
          done

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=html
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: frontend/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # API TESTS (Node.js)
  # ─────────────────────────────────────────────────────────────
  api-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artesanias_test
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run database migrations
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed database
        working-directory: backend
        run: npx prisma db seed || true
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      # Create .env.test for backend
      - name: Create backend env file
        working-directory: backend
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=3001
          API_PREFIX=/api/v1
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_SECRET=${{ env.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN=7d
          REDIS_URL=${{ env.REDIS_URL }}
          REDIS_PREFIX=artesanias:
          RATE_LIMIT_WINDOW_MS=900000
          RATE_LIMIT_MAX=100
          CORS_ORIGINS=http://localhost:5173
          BCRYPT_ROUNDS=12
          LOG_LEVEL=info
          EOF

      - name: Start backend server
        working-directory: backend
        run: npm run dev &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          REDIS_URL: ${{ env.REDIS_URL }}
          NODE_ENV: development
          PORT: 3001

      - name: Wait for backend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3001/api/v1/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 2
          done

      - name: Run API tests
        working-directory: backend
        run: npm run test:api
        env:
          API_URL: http://localhost:3001/api/v1
          NODE_ENV: test

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: backend/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # DEPLOY (only on main branch push)
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [playwright-tests, api-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_BACKEND_PATH }}
            git pull origin main
            cd backend
            npm ci
            npx prisma generate
            npm run build
            pm2 restart artesanias-backend || pm2 start dist/server.js --name artesanias-backend

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [playwright-tests, api-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}

      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_FRONTEND_PATH }}
            git pull origin main
            npm ci
            npm run build
            pm2 restart artesanias-frontend || pm2 start dist/server.js --name artesanias-frontend

  deploy-nginx:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Reload Nginx
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
